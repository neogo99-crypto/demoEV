<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EV ONE - Emergency Assistance</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: 'Kanit', sans-serif;
      }
      #map {
        height: calc(100vh - 80px);
        width: 100%;
        z-index: 1;
      }
      .leaflet-routing-container {
        display: none;
      }

      .info-card {
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        transform: translateY(20px);
        opacity: 0;
        pointer-events: none;
      }
      .info-card.show {
        transform: translateY(0);
        opacity: 1;
        pointer-events: auto;
      }

      /* Modal Animation */
      .modal-overlay {
        transition: all 0.3s ease;
        opacity: 0;
        pointer-events: none;
      }
      .modal-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }

      .active-mode {
        background-color: #ef4444 !important;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
        }
      }

      /* Custom Loading Spinner */
      .loader {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #4f46e5;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body class="bg-gray-50 overflow-hidden">
    <header
      class="h-20 bg-white shadow-md flex items-center justify-between px-6 sticky top-0 z-10"
    >
    <a href="index.html" class="flex items-center space-x-3 hover:opacity-80 transition-opacity">  
      <div class="flex items-center space-x-3">
        <div class="bg-indigo-600 p-2 rounded-lg">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6 text-white"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"
            />
          </svg>
        </div>
        <h1 class="text-xl font-bold text-gray-800">
          EV Power Delivery Service.
        </h1>
      </div>
    </a>
      <button
        id="dispatchBtn"
        class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-full font-semibold shadow-lg flex items-center space-x-2 transition-all"
      >
        <span id="btnIcon">⚡</span>
        <span id="btnText">เลือกให้บริการ</span>
      </button>
    </header>

    <main class="relative">
      <div id="map"></div>

      <div
        id="routeInfoCard"
        class="info-card absolute top-6 right-6 z-[1000] bg-white/95 backdrop-blur-md p-6 rounded-2xl shadow-2xl border border-indigo-100 w-80"
      >
        <div class="flex items-center justify-between mb-4">
          <span
            class="text-xs font-bold text-indigo-500 uppercase tracking-widest"
            >ข้อมูลการเดินทาง</span
          >
          <span
            class="px-2 py-1 bg-green-100 text-green-700 text-[10px] rounded-md font-bold"
            >ว่าง</span
          >
        </div>

        <div class="space-y-3 mb-6">
          <div class="flex justify-between items-end">
            <div class="text-gray-400 text-xs">ระยะทาง</div>
            <div class="text-xl font-bold text-gray-800">
              <span id="distVal">-</span>
              <span class="text-sm font-normal text-gray-500">กม.</span>
            </div>
          </div>
          <div class="flex justify-between items-end">
            <div class="text-gray-400 text-xs">เวลาเดินทางโดยประมาณ</div>
            <div class="text-xl font-bold text-gray-800">
              <span id="timeVal">-</span>
            </div>
          </div>
        </div>

        <button
          id="requestServiceBtn"
          class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-3 rounded-xl font-bold shadow-lg shadow-emerald-200 transition-all flex items-center justify-center space-x-2"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13 10V3L4 14h7v7l9-11h-7z"
            />
          </svg>
          <span>ขอรับบริการ</span>
        </button>
      </div>

      <div
        class="absolute bottom-6 left-6 z-[1000] bg-white p-4 rounded-xl shadow-xl border border-gray-100 text-sm"
      >
        <div class="space-y-2">
          <div class="flex items-center gap-2">
            <img
              src="gc.png"
              class="w-5 h-5"
            />
            <span>ว่าง (พร้อมบริการ)</span>
          </div>
          <div class="flex items-center gap-2">
            <img
              src="rc.png"
              class="w-5 h-5"
            />
            <span>ไม่ว่าง</span>
          </div>
        </div>
      </div>
    </main>

    <div
      id="requestModal"
      class="modal-overlay fixed inset-0 z-[2000] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4"
    >
      <div
        class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center transform transition-all"
      >
        <div id="modalLoading" class="space-y-6">
          <div class="flex justify-center">
            <div class="loader"></div>
          </div>
          <h3 class="text-xl font-bold text-gray-800">กำลังส่งคำขอ...</h3>
          <p class="text-gray-500">
            ระบบกำลังส่งพิกัดและข้อมูลการเดินทางไปยังผู้ให้บริการที่เลือก
          </p>
        </div>

        <div id="modalSuccess" class="hidden space-y-6">
          <div class="flex justify-center">
            <div class="bg-emerald-100 p-3 rounded-full">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-10 w-10 text-emerald-600"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="3"
                  d="M5 13l4 4L19 7"
                />
              </svg>
            </div>
          </div>
          <h3 class="text-xl font-bold text-gray-800">ส่งคำขอสำเร็จ!</h3>
          <p class="text-gray-500">
            ผู้ให้บริการได้รับข้อมูลแล้ว กำลังเริ่มออกเดินทางมาหาคุณ
          </p>
          <button
            onclick="closeModal()"
            class="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 py-3 rounded-xl font-bold transition-colors"
          >
            ตกลง
          </button>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <script>
      const CURRENT_POS = [13.2835, 100.9248];
      const SHEET_URL =
        'https://docs.google.com/spreadsheets/d/e/2PACX-1vShqdPryhVInqMcbJf5wuxVIomfL2UGWx4cXWQSFpQ2krWoXrixlM6RdKgmaI2W86_s1wUjkWvjAkA6/pub?gid=0&output=csv';

      let isSelectionMode = false;
      let map = L.map('map', { zoomControl: true }).setView(CURRENT_POS, 14);
      let routingControl = null;

      L.tileLayer(
        'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png'
      ).addTo(map);

      const carIcon = L.icon({
        iconUrl:
          'mycar.png',
        iconSize: [20, 32],
        iconAnchor: [22, 22],
      });
      const availableIcon = L.icon({
        iconUrl:
          'gc.png',
        iconSize: [30, 20],
        iconAnchor: [16, 32],
      });
      const busyIcon = L.icon({
        iconUrl:
          'rc.png',
        iconSize: [30, 20],
        iconAnchor: [16, 32],
      });

      L.marker(CURRENT_POS, { icon: carIcon })
        .addTo(map)
        .bindPopup('<b>ตำแหน่งปัจจุบันของคุณ</b>');

      async function loadData() {
        try {
          const res = await fetch(SHEET_URL);
          const csv = await res.text();
          const lines = csv.split('\n').slice(1);

          lines.forEach((line) => {
            const columns = line.split(',');
            if (columns.length > 7) {
              const lat = parseFloat(columns[2]);
              const lng = parseFloat(columns[3]);
              const status = columns[7].trim();

              const icon = status === '0' ? availableIcon : busyIcon;
              const marker = L.marker([lat, lng], { icon: icon }).addTo(map);

              marker.on('click', () => {
                if (!isSelectionMode) return;
                if (status === '0') {
                  drawRoute(lat, lng);
                } else {
                  alert('จุดนี้ไม่สามารถให้บริการได้');
                }
              });
            }
          });
        } catch (e) {
          console.log(e);
        }
      }

      function drawRoute(dLat, dLng) {
        if (routingControl) map.removeControl(routingControl);
        routingControl = L.Routing.control({
          waypoints: [L.latLng(CURRENT_POS), L.latLng(dLat, dLng)],
          lineOptions: {
            styles: [{ color: '#10b981', weight: 6, opacity: 0.8 }],
          },
          createMarker: () => null,
          addWaypoints: false,
        }).addTo(map);

        routingControl.on('routesfound', function (e) {
          const summary = e.routes[0].summary;
          document.getElementById('distVal').innerText = (
            summary.totalDistance / 1000
          ).toFixed(1);

          const timeSec = summary.totalTime;
          document.getElementById('timeVal').innerText =
            timeSec < 3600
              ? Math.round(timeSec / 60) + ' นาที'
              : Math.floor(timeSec / 3600) +
                ' ชม. ' +
                Math.round((timeSec % 3600) / 60) +
                ' นาที';

          document.getElementById('routeInfoCard').classList.add('show');
        });
      }

      // --- เพิ่ม Logic ปุ่มขอรับบริการ ---
      const requestBtn = document.getElementById('requestServiceBtn');
      const modal = document.getElementById('requestModal');
      const modalLoading = document.getElementById('modalLoading');
      const modalSuccess = document.getElementById('modalSuccess');

      requestBtn.addEventListener('click', () => {
        // 1. แสดงหน้าต่าง Modal
        modal.classList.add('active');
        modalLoading.classList.remove('hidden');
        modalSuccess.classList.add('hidden');

        // 2. จำลองการส่งข้อมูล (2 วินาที)
        setTimeout(() => {
          modalLoading.classList.add('hidden');
          modalSuccess.classList.remove('hidden');
        }, 2500);
      });

      function closeModal() {
        modal.classList.remove('active');
        // รีเซ็ตสถานะเมื่อปิด
        isSelectionMode = false;
        btn.classList.remove('active-mode');
        document.getElementById('btnText').innerText = 'เลือกให้บริการ';
        if (routingControl) map.removeControl(routingControl);
        document.getElementById('routeInfoCard').classList.remove('show');
      }

      // Button Toggle
      const btn = document.getElementById('dispatchBtn');
      btn.addEventListener('click', () => {
        isSelectionMode = !isSelectionMode;
        if (isSelectionMode) {
          btn.classList.add('active-mode');
          document.getElementById('btnText').innerText = 'ยกเลิก';
          document.getElementById('btnIcon').innerText = '✖️';
        } else {
          btn.classList.remove('active-mode');
          document.getElementById('btnText').innerText = 'เลือกให้บริการ';
          document.getElementById('btnIcon').innerText = '⚡';
          if (routingControl) map.removeControl(routingControl);
          document.getElementById('routeInfoCard').classList.remove('show');
        }
      });

      loadData();
    </script>
  </body>
</html>
